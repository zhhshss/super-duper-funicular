name: Build and Publish HuggingFace Codeserver (Root + Password)

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Docker Context Files
        run: |
          # 1. 极简版 Nginx 配置 (Root 权限直接运行)
          cat << 'EOF' > nginx.conf
          events {
              worker_connections 1024;
          }
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              server {
                  listen 7860;

                  # 伪装的 AI 网页
                  location / {
                      root /var/www/html;
                      index index.html;
                  }

                  # 健康检查
                  location = /health {
                      return 200 '{"status": "healthy", "service": "ai-node-root"}';
                      add_header Content-Type application/json;
                  }

                  # 隐藏的 Codespace
                  location /110133b6-2a08-4973-87ae-ee13b59a68a4/ {
                      proxy_pass http://127.0.0.1:8080/;
                      proxy_set_header Host $host;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection "upgrade";
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
              }
          }
          EOF

          # 2. 伪装网页
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>Model Inference API</title>
              <style>
                  body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                  h1 { color: #ffcc00; font-size: 2rem; margin-bottom: 1rem; }
                  .status-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 1rem; margin-top: 2rem; display: inline-flex; align-items: center; gap: 10px; }
                  .dot { width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; }
                  .status-text { font-weight: 500; color: #10b981; }
              </style>
          </head>
          <body>
              <div>
                  <h1>Model Inference API</h1>
                  <div class="status-card">
                      <div class="dot"></div>
                      <span class="status-text">Endpoint: Active</span>
                  </div>
              </div>
          </body>
          </html>
          EOF

          # 3. 启动脚本 (全程 Root，加入密码验证逻辑)
          cat << 'EOF' > entrypoint.sh
          #!/bin/bash
          nginx
          
          # 读取外部环境变量 PASSWORD
          # 如果外部没有提供密码，则使用默认密码 "huggingface2026"（你可以自行修改）
          export PASSWORD=${PASSWORD:-"huggingface2026"}
          
          # 启用密码验证启动 code-server
          exec code-server --bind-addr 127.0.0.1:8080 --auth password
          EOF

          # 4. Dockerfile (去掉所有权限切换，一路 Root 到底)
          cat << 'EOF' > Dockerfile
          FROM codercom/code-server:latest

          # 强制全局 Root
          USER root

          # 安装 Nginx、Python 和基础工具
          RUN apt-get update && apt-get install -y \
              nginx git curl wget python3 python3-pip python3-venv \
              && apt-get clean && rm -rf /var/lib/apt/lists/*

          # 安装 Node.js 和 pnpm
          RUN curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && \
              apt-get install -y nodejs && \
              npm install -g pnpm

          # 复制配置文件
          COPY nginx.conf /etc/nginx/nginx.conf
          COPY index.html /var/www/html/index.html
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh

          # 直接以 Root 身份安装 VS Code 扩展
          RUN code-server --install-extension ms-python.python \
              && code-server --install-extension eamodio.gitlens \
              && code-server --install-extension dbaeumer.vscode-eslint

          # 暴露 Hugging Face 要求的 7860 端口
          EXPOSE 7860

          ENTRYPOINT ["/entrypoint.sh"]
          EOF

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
