name: Build and Publish HF Codeserver (Final Version)

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Docker Context Files
        run: |
          # 1. 极简版 Nginx 配置 (Root 权限直接运行)
          cat << 'EOF' > nginx.conf
          events {
              worker_connections 1024;
          }
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              server {
                  listen 7860;

                  # 伪装的 AI 网页
                  location / {
                      root /var/www/html;
                      index index.html;
                  }

                  # 健康检查
                  location = /health {
                      return 200 '{"status": "healthy", "service": "ai-node-root"}';
                      add_header Content-Type application/json;
                  }

                  # 隐藏的 Codespace
                  location /110133b6-2a08-4973-87ae-ee13b59a68a4/ {
                      proxy_pass http://127.0.0.1:8080/;
                      proxy_set_header Host $host;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection "upgrade";
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
              }
          }
          EOF

          # 2. 伪装网页
          cat << 'EOF' > index
