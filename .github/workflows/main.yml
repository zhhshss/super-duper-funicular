name: Build and Publish Codeserver

on:
  push:
    branches: [ "main" ] # 触发构建的分支，可根据需要修改为 master 或其他分支

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 核心步骤：在云端构建时动态生成所有依赖的子配置文件
      - name: Generate Docker Context Files
        run: |
          # 1. 生成 Nginx 路由配置文件
          cat << 'EOF' > nginx.conf
          events {
              worker_connections 1024;
          }
          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              server {
                  listen 7890;

                  # 根路径：显示伪装的 AI 网页
                  location / {
                      root /var/www/html;
                      index index.html;
                  }

                  # 健康检查接口
                  location = /health {
                      return 200 '{"status": "healthy", "service": "ai-platform", "timestamp": "rolling"}';
                      add_header Content-Type application/json;
                  }

                  # 隐藏的 Codespace 访问路径 (支持 WebSocket 协议转发)
                  location /110133b6-2a08-4973-87ae-ee13b59a68a4/ {
                      proxy_pass http://127.0.0.1:8080/;
                      proxy_set_header Host $host;
                      proxy_set_header Upgrade $http_upgrade;
                      proxy_set_header Connection "upgrade";
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
              }
          }
          EOF

          # 2. 生成伪装的 AI 首页
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>AI Large Model Training Platform</title>
              <style>
                  body { background-color: #0b0f19; color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                  .container { text-align: center; max-width: 600px; padding: 20px; }
                  h1 { color: #3b82f6; font-size: 2.5rem; margin-bottom: 1rem; font-weight: 600; letter-spacing: -0.05em; }
                  p { color: #9ca3af; font-size: 1.1rem; line-height: 1.6; }
                  .status-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 1.5rem; margin-top: 2rem; display: inline-flex; align-items: center; gap: 10px; }
                  .dot { width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
                  .status-text { font-weight: 500; color: #10b981; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Cluster Inference Node #04</h1>
                  <p>Distributed training environment initialized. Token generation endpoints and model validation pipelines are fully operational.</p>
                  <p style="font-size: 0.9rem; color: #4b5563;">Unauthorized access to infrastructure telemetry is strictly prohibited.</p>
                  <div class="status-card">
                      <div class="dot"></div>
                      <span class="status-text">Node Status: Active & Healthy</span>
                  </div>
              </div>
          </body>
          </html>
          EOF

          # 3. 生成容器启动入口脚本
          cat << 'EOF' > entrypoint.sh
          #!/bin/bash
          # 启动 Nginx (使用 sudo，因为官方镜像的 coder 用户拥有无密码 sudo 权限)
          sudo nginx
          # 启动 code-server 并将其绑定在 127.0.0.1 阻断外界直接访问
          exec code-server --bind-addr 127.0.0.1:8080 --auth none
          EOF

          # 4. 生成统一的 Dockerfile
          cat << 'EOF' > Dockerfile
          FROM codercom/code-server:latest

          USER root

          # 安装 Nginx 以及基础环境 (Python3)
          RUN apt-get update && apt-get install -y \
              nginx \
              git curl wget \
              python3 python3-pip python3-venv \
              && apt-get clean && rm -rf /var/lib/apt/lists/*

          # 安装 Node.js 20 和 pnpm
          RUN curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && \
              apt-get install -y nodejs && \
              npm install -g pnpm

          # 移动配置文件与启动脚本
          COPY nginx.conf /etc/nginx/nginx.conf
          COPY index.html /var/www/html/index.html
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh

          # 切换回默认的 coder 用户以安全地配置 VS Code 环境
          USER coder

          # 预装 VS Code 常用扩展插件（Python 语言支持、GitLens、ESLint）
          RUN code-server --install-extension ms-python.python \
              && code-server --install-extension eamodio.gitlens \
              && code-server --install-extension dbaeumer.vscode-eslint

          EXPOSE 7890

          ENTRYPOINT ["/entrypoint.sh"]
          EOF

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
